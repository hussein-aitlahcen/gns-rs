name: Release
on:
  push:
    branches:
      - master
jobs:
  release-plz:
    name: Release
    if: github.repository == 'hussein-aitlahcen/gns-rs'
    environment: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Enable OIDC
      contents: write
      pull-requests: read
    steps:
      - &checkout
        name: Setup | Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: true
      - &install-nix
        name: Setup | Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - &use-nix
        name: Setup | Use Nix
        uses: rrbutani/use-nix-shell-action@v1
      - name: Release
        uses: release-plz/action@064f4d1
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-plz-pr:
    name: Release PR
    if: github.repository == 'hussein-aitlahcen/gns-rs'
    environment: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-nix
      - *use-nix
      - name: Release PR
        uses: release-plz/action@064f4d1
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}